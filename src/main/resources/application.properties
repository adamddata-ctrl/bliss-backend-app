
# MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bliss_cafeteria
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Creation Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Port Setu
server.port=8080

spring.h2.console.enabled=true

# Absolute folder path on your computer where images will be physically saved
file.upload-dir=C:/bliss_cafeteria/uploads

# Set max file size limits (Spring Boot defaults to 1MB, which is too low for modern phones)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
