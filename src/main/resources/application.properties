# MySQL Connection Configuration (Uses local database fallback by default)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bliss_cafeteria}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Creation Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Port Setup
server.port=${PORT:8080}

# Cloud-Safe Absolute Folder Path for uploaded images
file.upload-dir=${UPLOAD_DIR:/tmp/bliss_cafeteria/uploads}

# Max file size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB